databaseChangeLog:
  - changeSet:
      id: "02.create_table_page.yml"
      author: "Panyukov NN"
      changes:
        - createTable:
            tableName: page
            remarks: "Страницы мобильного приложения для поиска"
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar
                  remarks: "Название страницы"
              - column:
                  name: version
                  type: varchar
                  remarks: "Версия приложения"
              - column:
                  name: platform
                  type: varchar
                  remarks: "Платформа"
              - column:
                  name: link
                  type: varchar
                  remarks: "Ссылка на страницу в приложении"
              - column:
                  name: dictionary
                  type: varchar
                  remarks: "Словарь ключевых слов для поиска"
              - column:
                  name: top_result
                  type: boolean
                  remarks: "Признак топового результата поиска"

              - column:
                  name: create_time
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP AT TIME ZONE 'UTC'
                  constraints:
                    nullable: false
                  remarks: "Время создания"
              - column:
                  name: create_user
                  type: varchar
                  constraints:
                    nullable: false
                  remarks: "Пользователь, создавший запись"
              - column:
                  name: last_update_time
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP AT TIME ZONE 'UTC'
                  constraints:
                    nullable: false
                  remarks: "Время обновления"
              - column:
                  name: last_update_user
                  type: varchar
                  constraints:
                    nullable: false
                  remarks: "Пользователь, изменивший запись"